<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moooz haha</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000; /* رنگ مشکی برای فضاهای خالی دور عکس */
            overflow: hidden;
            font-family: sans-serif;
        }

        /* لایه عکس پس‌زمینه برای کنترل دقیق ابعاد روی موبایل و دسکتاپ */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg.jpg') no-repeat center center;
            background-size: contain; /* کل عکس بدون بریدگی و دفرمه شدن در صفحه جا می‌شود */
            z-index: 1;
        }

        /* استایل دکمه پخش */
        .play-btn {
            position: relative;
            z-index: 10;
            padding: 18px 36px;
            font-size: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: all 0.2s ease;
            -webkit-user-select: none;
            user-select: none;
        }

        .play-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>

    <button class="play-btn" id="btn">پخش موزیک 🎵</button>

    <audio id="audio" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        var btn = document.getElementById('btn');
        var audio = document.getElementById('audio');

        // استفاده از رویداد لمس (pointerdown) برای واکنش سریع‌تر و عبور از سد مرورگر موبایل
        btn.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            
            // تلاش برای پخش آهنگ با استفاده مستقیم از تعامل کاربر
            audio.play().then(function() {
                // اگر پخش موفق بود، دکمه غیب می‌شود
                btn.style.display = 'none';
            }).catch(function(error) {
                // اگر باز هم مرورگر لجبازی کرد، یک تلاش مجدد با متد نیتیو انجام می‌دهد
                setTimeout(function() {
                    audio.play();
                    btn.style.display = 'none';
                }, 50);
                console.log("پخش خودکار محدود شد:", error);
            });
        });
    </script>

</body>
</html>
