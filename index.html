<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فضای موزیکال</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* فرستادن محتوا به پایین صفحه */
            align-items: center;
            background-color: #000;
            overflow: hidden;
            font-family: sans-serif;
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg.jpg') no-repeat center center;
            background-size: contain;
            z-index: 1;
        }

        /* استایل دکمه در پایین صفحه - بسیار کوچک و مینیمال */
        .play-btn {
            position: relative;
            z-index: 10;
            margin-bottom: 40px; /* فاصله از لبه پایین صفحه */
            padding: 10px 25px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .play-btn:active {
            transform: scale(0.95);
            background: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>

    <button class="play-btn" id="btn">mmmmmm 🎵</button>

    <audio id="audio" loop preload="auto" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"></audio>

    <script>
        var btn = document.getElementById('btn');
        var audio = document.getElementById('audio');

        // تعریف عملکرد کلیک و لمس به صورت همزمان برای لود قطعی
        function playMusic() {
            // یک بار لود مجدد برای اطمینان از اتصال به سرور موزیک
            audio.load(); 
            
            audio.play().then(function() {
                btn.style.display = 'none';
            }).catch(function(error) {
                // تلاش مجدد در صورت بروز خطای مرورگر
                audio.muted = false;
                audio.play();
                btn.style.display = 'none';
                console.log("Error playing:", error);
            });
        }

        btn.addEventListener('click', playMusic);
        btn.addEventListener('touchstart', playMusic);
    </script>

</body>
</html>
