<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فضای موزیکال</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000; /* پس‌زمینه مشکی برای پر کردن جاهای خالی دور عکس */
            
            /* اصلاح سایز عکس: contain باعث می‌شود کل عکس بدون قیچی شدن دیده شود */
            background: url('bg.jpg') no-repeat center center fixed;
            background-size: contain; 
            
            overflow: hidden;
            font-family: sans-serif;
            -webkit-user-select: none; /* جلوگیری از انتخاب متن یا دکمه */
            user-select: none;
        }

        .play-btn {
            padding: 18px 36px;
            font-size: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .play-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            border-color: #fff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <button class="play-btn" id="btn">پخش موزیک 🎵</button>

    <audio id="audio" loop src="./music.mp3"></audio>

    <script>
        document.getElementById('btn').addEventListener('click', function() {
            var myAudio = document.getElementById('audio');
            
            // دستور پخش صوتی
            myAudio.play().then(function() {
                console.log("موزیک با موفقیت پخش شد.");
            }).catch(function(error) {
                alert("مرورگر اجازه پخش صدا را نداد. لطفاً دوباره کلیک کنید.");
                console.log("خطا:", error);
            });
            
            // مخفی کردن دکمه
            this.style.display = 'none';
        });
    </script>

</body>
</html>
